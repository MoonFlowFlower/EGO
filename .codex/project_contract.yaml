commit_policy:
  mode: direct-main
  push: true
  require_scoped_staging: true

task_classification:
  ready_project_statuses:
    - In Progress
    - Todo
  ready_title_prefixes:
    - "Codex Toolkit:"
    - "EgoSubject:"
    - "EgoOperator:"
    - "EgoRoadmap:"
    - "EgoDesktop:"
  epic_title_prefixes:
    - "Epic "
  research_title_prefixes:
    - "Research:"
  ready_body_markers:
    - "Acceptance gate"
    - "Claim ceiling"
    - "Rollback"
  supporting_title_prefixes:
    - "Supporting:"
    - "Supporting Done:"
  parked_title_prefixes:
    - "Parked:"
  aggregate_title_contains:
    - "backlog"
    - "trial observation review"
    - "task board bootstrap"
  human_required_title_contains:
    - "human operator trial"
    - "human trial"
    - "real-provider human"
    - "scheduled dry-run patrol"
  high_impact_title_contains:
    - "program state"
    - "evidence ledger"
    - "mainline demotion"
    - "memory promotion"

auto_closeout:
  default_observation_class: deterministic_local
  done_status: Done
  observation_verify_profiles:
    deterministic_local: autopilot_full
    research: autopilot_full
    scripted_real_entry: autopilot_full
    scripted_with_llm_judge: autopilot_full
  llm_review_observation_classes:
    - scripted_with_llm_judge
  hard_stop_classes:
    - human_required
    - aggregate
    - parked
    - supporting
    - unknown
    - high_impact
    - blocked
  hard_stop_title_contains:
    - "program state"
    - "evidence ledger"
    - "mainline demotion"
    - "memory promotion"
    - "permissions expansion"
    - "permission expansion"
    - "stage card"
  hard_stop_body_markers:
    - "requires stage card"
    - "stage card required"
    - "modifies docs/PROGRAM_STATE_UNIFIED.yaml"
    - "touches docs/PROGRAM_STATE_UNIFIED.yaml"
    - "modifies artifacts/evidence_ledger"
    - "touches artifacts/evidence_ledger"
    - "permission expansion required"
    - "memory promotion required"
  claim_ceiling: Codex autopilot verified closeout local workflow candidate pass

auto_execute:
  require_project_status: In Progress
  allowed_observation_classes:
    - deterministic_local
    - scripted_real_entry
  blocked_observation_classes:
    - scripted_with_llm_judge
    - human_required
    - aggregate
    - parked
    - supporting
    - unknown
    - high_impact
  observation_verify_profiles:
    deterministic_local: autopilot_full
    scripted_real_entry: autopilot_full
  hard_stop_classes:
    - human_required
    - aggregate
    - parked
    - supporting
    - unknown
    - high_impact
    - blocked
  hard_stop_title_contains:
    - "program state"
    - "evidence ledger"
    - "mainline demotion"
    - "memory promotion"
    - "permissions expansion"
    - "permission expansion"
    - "stage card"
  hard_stop_body_markers:
    - "requires stage card"
    - "stage card required"
    - "modifies docs/PROGRAM_STATE_UNIFIED.yaml"
    - "touches docs/PROGRAM_STATE_UNIFIED.yaml"
    - "modifies artifacts/evidence_ledger"
    - "touches artifacts/evidence_ledger"
    - "permission expansion required"
    - "memory promotion required"
  claim_ceiling: Codex autopilot ready-issue executor gate local candidate pass

auto_pause:
  enabled: true
  recent_report_limit: 8
  repeated_failure_threshold: 3
  repeated_issue_threshold: 3
  pausing_stop_reasons:
    - dirty_worktree_unsafe
    - dirty_scope_unsafe
    - closeout_not_eligible
    - issue_not_ready
    - no_ready_issue
    - l5_execute_not_implemented

goal_control:
  planning_backend: codex_exec
  native_goal_enabled: false
  candidate_issue_limit: 3
  recent_report_limit: 8
  hard_stop_markers:
    - "program state"
    - "evidence ledger"
    - "permissions expansion"
    - "permission expansion"
    - "memory promotion"
    - "mainline demotion"
    - "stage card"
    - "docs/PROGRAM_STATE_UNIFIED.yaml"
    - "artifacts/evidence_ledger"
  claim_ceiling: Codex Autopilot goal-aware meta-control local workflow candidate pass

epic_rollup:
  parent_marker: "Parent epic"
  child_title_prefixes:
    - "EgoRoadmap:"
    - "EgoOperator:"
    - "EgoDesktop:"
    - "Research:"
  closeout_claim_ceiling: Codex autopilot epic rollup and real-task execution local workflow candidate pass
  block_child_classes:
    - human_required
    - high_impact
    - blocked
    - unknown

observation_classes:
  deterministic_local:
    closeout_allowed: true
    description: Unit tests or local deterministic scripts provide a direct oracle.
  research:
    closeout_allowed: true
    description: A bounded research/report artifact provides issue-specific evidence; no runtime efficacy or human perception claim is made.
  scripted_real_entry:
    closeout_allowed: true
    description: The same user-facing entrypoint can be scripted and judged deterministically.
  scripted_with_llm_judge:
    closeout_allowed: false
    description: Batchable with a conservative LLM judge such as GPT-5.5; hard-stop gates and claim ceilings still win.
  human_required:
    closeout_allowed: false
    description: Requires human preference, external account observation, or high-impact route decision.
