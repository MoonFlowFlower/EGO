version: 1

project:
  name: EGO
  repo: MoonFlowFlower/EGO
  default_branch: main

github_project:
  owner: MoonFlowFlower
  number: 1
  status_field: Status

github_rate_limit:
  wait_mode: bounded
  max_wait_seconds: 2100
  grace_seconds: 5
  max_retries: 1

task_state:
  source: local_board
  board_path: Tasks/TASK_BOARD.yaml
  github_project_role: mirror
  sync_state_path: artifacts/task_board/sync_state.json
  sync_log_path: artifacts/task_board/sync_log.jsonl
  outbox_path: artifacts/task_board/outbox.jsonl

session_bootstrap:
  required: true
  command:
    - python
    - scripts/codex_session_guard.py
    - bootstrap
    - --format
    - markdown
  required_snapshot_fields:
    - program_state.current_phase
    - program_state.current_layer
    - program_state.highest_evidence_level
    - program_state.next_minimal_action
    - git.origin_repo
    - git.branch
    - remote_contract_check.status
    - dirty_state.counts
    - task_board.plan_next
    - github_sync.status
  claim_ceiling: Codex session bootstrap local workflow candidate pass

closeout_gate:
  required: true
  command:
    - python
    - scripts/codex_session_guard.py
    - closeout-check
    - --format
    - markdown
  require_scoped_staging: true
  require_push: true
  require_task_board_github_sync: true
  local_only_path_prefixes:
    - data/live2d/
    - Test/
    - EgoDesktop/tts_output/
    - artifacts/desktop_tts/
  verification_commands:
    - python -m py_compile scripts/codex_session_guard.py scripts/codex_project_autopilot.py scripts/codex_memory.py
    - python -m pytest -q scripts/tests/test_codex_session_guard.py scripts/tests/test_codex_project_autopilot.py
    - git diff --check
  claim_ceiling: Codex closeout gate local workflow candidate pass

legacy_external_refs:
  github_repos:
    - pen364692088/EGO
  policy: "Treat historical issue URLs as legacy references; future mirror sync targets project.repo/github_project.owner unless an explicit migration map is provided."

verify_profiles:
  autopilot_target:
    commands:
      - label: autopilot_py_compile
        command:
          - python3
          - -m
          - py_compile
          - scripts/codex_project_autopilot.py
          - scripts/codex_session_guard.py
          - scripts/github_project_task.py
          - scripts/sync_github_project.py
          - scripts/ego_operator_devloop.py
          - scripts/validate_experience_eval_contract.py
          - scripts/run_ego_experience_trial.py
          - scripts/import_human_observation_comments.py
          - EgoOperator/agent_base.py
          - EgoOperator/memory_system.py
          - EgoOperator/primitives/initiative.py
          - EgoOperator/primitives/subject_context.py
      - label: autopilot_tests
        command:
          - python3
          - -m
          - pytest
          - -q
          - scripts/tests/test_codex_project_autopilot.py
          - scripts/tests/test_codex_session_guard.py
          - scripts/tests/test_functional_subject_contract.py
        env:
          TMPDIR: /tmp
  autopilot_full:
    commands:
      - label: script_tests
        command:
          - python3
          - -m
          - pytest
          - -q
          - scripts/tests/test_github_project_task.py
          - scripts/tests/test_sync_github_project.py
          - scripts/tests/test_ego_operator_devloop.py
          - scripts/tests/test_codex_project_autopilot.py
          - scripts/tests/test_experience_eval_contract.py
          - scripts/tests/test_run_ego_experience_trial.py
          - scripts/tests/test_import_human_observation_comments.py
          - scripts/tests/test_functional_subject_contract.py
          - EgoOperator/tests/test_memory_system.py
          - EgoOperator/tests/test_extracted_primitives.py
          - EgoOperator/tests/test_operator_runtime_contract.py
        env:
          TMPDIR: /tmp
      - label: diff_check
        command:
          - git
          - diff
          - --check
          - --
          - .codex
          - .agents/skills/codex-project-autopilot
          - AGENTS.md
          - CODEX_MEMORY.md
          - scripts
          - scripts/tests
          - Tasks/TASK_BOARD.yaml
          - Tasks/stage_cards
          - artifacts/task_board
          - docs/codex/tasks/codex-task-board-canonical-store-v1
