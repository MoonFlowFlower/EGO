version: MVP12
title: Developmental Core Sandbox
goal: >
  Establish a developmental core that generates internal candidates and
  long-run developmental traces inside a governed sandbox without taking
  reply or execution authority.
formal_runtime_owner:
  - EgoCore/app/runtime_v2
  - EgoCore/app/runtime_v2/proto_self_runtime.py
  - EgoCore/app/openemotion_adapter/proto_self_adapter.py
  - OpenEmotion/openemotion/proto_self_v2
implementation_library:
  - OpenEmotion/emotiond/developmental_core
compat_reference_only:
  - OpenEmotion/emotiond/daemon.py
  - OpenEmotion/emotiond/developmental
  - EgoCore/app/openemotion_adapter/developmental_writeback.py
in_scope:
  - controlled_developmental_tick_runtime
  - developmental_shadow_writeback
  - candidate_pool_generation
  - developmental_trace_capture
  - replay_consistency
  - sandbox_governance
out_of_scope:
  - direct_reply_authority
  - response_plan_injection
  - persistent_self_model
  - endogenous_drives
  - reflective_counterfactual_self
  - promotion_to_formal_proto_self
required_artifacts:
  - artifacts/mvp12/developmental_cycles.json
  - artifacts/mvp12/developmental_cycles.jsonl
  - artifacts/mvp12/candidate_pool.json
  - artifacts/mvp12/shadow_state.json
  - artifacts/mvp12/replay_consistency_report.json
  - artifacts/mvp12/gate_checklist.md
  - artifacts/mvp12/controlled_observation_report.json
  - artifacts/mvp12/controlled_observation_report.md
  - artifacts/mvp12/observation_index.jsonl
  - artifacts/mvp12/controlled_observation_aggregate_current.json
  - artifacts/mvp12/controlled_observation_aggregate_current.md
required_tests:
  - pytest -q openemotion/proto_self_v2/tests/test_developmental_sandbox.py
  - pytest -q EgoCore/tests/test_runtime_v2_proto_self_runtime.py -k developmental
  - pytest -q EgoCore/tests/test_proto_self_v2_contracts.py -k developmental
  - python OpenEmotion/tools/run_mvp12_controlled_evidence.py
  - python OpenEmotion/tools/aggregate_mvp12_observations.py
required_gates:
  - sandbox_no_authority_bypass
  - shadow_only_writeback
  - developmental_trace_present
  - replay_consistency_ge_threshold
promotion_criteria:
  - developmental_trace_present
  - replay_consistency_ge_0.99
  - governance_violation_count_eq_0
  - candidate_generation_non_random_under_long_run
stop_conditions:
  - authority_bypass_detected
  - replay_consistency_below_threshold
  - missing_audit_trail
human_escalation:
  - change_governor_authority
  - allow_direct_behavior_control
  - promote_to_mvp13
