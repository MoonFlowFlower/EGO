  active: Current execution candidate.
  blocked: Waiting on human smoke, Stage Card, external system, or explicit approval.
  evidence_ready: Local/scripted evidence is ready for closeout review.
  accepted: Task was closed or accepted.
  parked: Intentionally deferred.

